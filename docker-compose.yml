services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_ar
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: postgres://erp_user:erp_pass@db:5432/erp_ar
      JWT_SECRET: super_secret_change_me
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pg_data:
